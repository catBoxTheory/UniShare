<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UniShare 雙語字幕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 12px;
      color: #888;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .toggle-label {
      font-size: 14px;
    }
    
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      transition: 0.3s;
      border-radius: 26px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }
    
    .status {
      background: rgba(255,255,255,0.05);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    
    .status-dot.inactive {
      background: #ef4444;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 11px;
      color: #666;
      text-align: center;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">字</div>
    <div>
      <div class="title">UniShare 雙語字幕</div>
      <div class="subtitle">YouTube 英中即時翻譯</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">設定</div>
    
    <div class="toggle-row">
      <span class="toggle-label">啟用雙語字幕</span>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">顯示原文 (英文)</span>
      <label class="toggle">
        <input type="checkbox" id="showEnglish" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">顯示翻譯 (繁中)</span>
      <label class="toggle">
        <input type="checkbox" id="showChinese" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">狀態</div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">已啟用</span>
    </div>
  </div>
  
  <div class="footer">
    <a href="https://unishare.dpdns.org" target="_blank">UniShare</a> - 大學資源共享平台
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
