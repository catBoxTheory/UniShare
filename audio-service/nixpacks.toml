# Nixpacks configuration for Railway
# Ensures Python 3.11 and ffmpeg are properly installed

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = ["python3.11 -m pip install --upgrade pip", "python3.11 -m pip install -r requirements.txt"]

[start]
cmd = "python3.11 -m gunicorn app:app --bind 0.0.0.0:$PORT"
